<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitorizare Tablou Verișori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0c; color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .panel-glass { background: linear-gradient(145deg, rgba(20, 20, 25, 0.95), rgba(10, 10, 15, 0.95)); border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .circuit-card { background: rgba(30, 30, 40, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 4px solid #da3633; transition: all 0.3s ease; }
        .circuit-on { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #da3633; }
        .status-dot-on { background-color: #10b981; box-shadow: 0 0 12px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .label-tech { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; color: #71717a; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">
    <div class="w-full max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center items-center md:items-start">
                <div class="label-tech mb-1">TEMPERATURĂ</div>
                <div class="flex items-baseline gap-2">
                    <span id="temp-val" class="text-4xl font-bold header-font text-emerald-400">--</span>
                    <span class="text-lg text-gray-500 font-bold">°C</span>
                </div>
            </div>
            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center items-center md:items-start">
                <div class="label-tech mb-1">UMIDITATE</div>
                <div class="flex items-baseline gap-2">
                    <span id="hum-val" class="text-4xl font-bold header-font text-sky-400">--</span>
                    <span class="text-lg text-gray-500 font-bold">%</span>
                </div>
            </div>
            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center">
                <div class="flex justify-between items-center mb-2">
                    <div class="label-tech">CONEXIUNE</div>
                    <div id="conn-status" class="w-3 h-3 rounded-full bg-red-600"></div>
                </div>
                <div id="last-sync" class="text-[10px] font-mono text-gray-500 uppercase">UPDATE: --:--:--</div>
            </div>
        </div>

        <div class="panel-glass rounded-[2rem] p-6 md:p-10">
            <div class="mb-8 border-b border-gray-800 pb-6 flex justify-between items-end">
                <div>
                    <h1 class="header-font text-xl text-gray-200 tracking-tighter uppercase">Monitorizare Tablou Verișori</h1>
                    <p class="text-gray-500 text-xs mt-1 italic">Sistem 8 Optocuploare</p>
                </div>
                <div class="flex items-center gap-2">
                    <div id="sys-pulse" class="w-2 h-2 rounded-full bg-red-600"></div>
                    <span id="sys-text" class="label-tech text-red-500">Sistem Offline</span>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="grid-inputs"></div>
        </div>
    </div>

    <script>
        // Configurare legată direct la baza ta de date
        const firebaseConfig = { databaseURL: "https://monitorizate-tablou-verzisori-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ORDINEA EXACTĂ DIN POZA TA, dar cu cheile potrivite pentru Firebase
        const sensors = [
            { label: "GENERALA", fireKey: "Generala" },
            { label: "GENERATOR", fireKey: "Generator" },
            { label: "UPS 1", fireKey: "UPS 1" },
            { label: "UPS 2", fireKey: "UPS 2" },
            { label: "UPS 3", fireKey: "UPS 3" },
            { label: "AC 1", fireKey: "AC 1" },
            { label: "AC 2", fireKey: "AC 2" },
            { label: "REZERVA", fireKey: "Rezerva" }
        ];

        const container = document.getElementById('grid-inputs');
        sensors.forEach((s, i) => {
            const div = document.createElement('div');
            div.id = `card-${i}`;
            div.className = `circuit-card rounded-xl p-4 flex flex-col justify-between h-28`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="bg-gray-800/50 px-2 py-0.5 rounded text-[9px] font-bold text-gray-400 uppercase">IN ${i + 1}</div>
                    <div id="dot-${i}" class="status-dot"></div>
                </div>
                <div>
                    <div class="text-[12px] font-bold text-gray-100 mb-1 uppercase tracking-tight">${s.label}</div>
                    <div id="status-${i}" class="text-[9px] uppercase text-gray-500 font-bold italic">LIPSĂ DATE</div>
                </div>
            `;
            container.appendChild(div);
        });

        // Ascultăm schimbările
        db.ref('verzisori').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // Indicatori online
            document.getElementById('conn-status').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
            document.getElementById('sys-pulse').className = "status-dot-on w-2 h-2";
            document.getElementById('sys-text').innerText = "Sistem Online";
            document.getElementById('sys-text').className = "label-tech text-emerald-500";
            document.getElementById('last-sync').innerText = "UPDATE: " + new Date().toLocaleTimeString('ro-RO');

            // Mediu
            if(data.setari) {
                document.getElementById('temp-val').innerText = data.setari.temperatura || "--";
                document.getElementById('hum-val').innerText = data.setari.umiditate || "--";
            }

            // Siguranțe
            if(data.sigurante) {
                sensors.forEach((s, i) => {
                    const stare = data.sigurante[s.fireKey]; // Aici verifică Generala, Generator, etc.
                    const card = document.getElementById(`card-${i}`);
                    const dot = document.getElementById(`dot-${i}`);
                    const text = document.getElementById(`status-${i}`);

                    if(stare === "OK") {
                        card.classList.add('circuit-on');
                        dot.className = "status-dot status-dot-on";
                        text.innerText = "TENSIUNE OK";
                        text.className = "text-[9px] uppercase text-emerald-500 font-bold";
                    } else if (stare === "ALERTA") {
                        card.classList.remove('circuit-on');
                        dot.className = "status-dot";
                        text.innerText = "ALERTA / OFF";
                        text.className = "text-[9px] uppercase text-red-500 font-bold";
                    } else {
                        // Dacă nu există cheia deloc în Firebase
                        card.classList.remove('circuit-on');
                        dot.className = "status-dot";
                        text.innerText = "DECONECTAT";
                        text.className = "text-[9px] uppercase text-gray-600 font-bold";
                    }
                });
            }
        });
    </script>
</body>
</html>
