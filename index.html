<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitorizare Tablou Verișori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0a0a0c;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        .panel-glass {
            background: linear-gradient(145deg, rgba(20, 20, 25, 0.95), rgba(10, 10, 15, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .circuit-card {
            background: rgba(30, 30, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #da3633; /* Roșu implicit (Alerta) */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .circuit-on {
            border-left-color: #10b981; /* Verde (OK) */
            background: rgba(16, 185, 129, 0.05);
            border-right: 1px solid rgba(16, 185, 129, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #da3633;
        }

        .status-dot-on {
            background-color: #10b981;
            box-shadow: 0 0 12px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .label-tech {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #71717a;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div class="w-full max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center items-center md:items-start">
                <div class="label-tech mb-1">TEMPERATURĂ MEDIU</div>
                <div class="flex items-baseline gap-2">
                    <span id="temp-val" class="text-4xl font-bold header-font text-emerald-400">--</span>
                    <span class="text-lg text-gray-500 font-bold">°C</span>
                </div>
            </div>
            
            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center items-center md:items-start">
                <div class="label-tech mb-1">UMIDITATE</div>
                <div class="flex items-baseline gap-2">
                    <span id="hum-val" class="text-4xl font-bold header-font text-sky-400">--</span>
                    <span class="text-lg text-gray-500 font-bold">%</span>
                </div>
            </div>

            <div class="panel-glass rounded-2xl p-5 flex flex-col justify-center">
                <div class="flex justify-between items-center mb-2">
                    <div class="label-tech">STATUS CONEXIUNE</div>
                    <div id="conn-status" class="w-3 h-3 rounded-full bg-red-600"></div>
                </div>
                <div class="flex flex-col gap-1 text-[10px] font-mono text-gray-500">
                    <span id="last-sync uppercase">ULTIMUL UPDATE: --:--:--</span>
                </div>
            </div>
        </div>

        <div class="panel-glass rounded-[2rem] p-6 md:p-10">
            <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-gray-800 pb-6">
                <div>
                    <h1 class="header-font text-xl text-gray-200 tracking-tighter uppercase">Tablou Monitorizare Verișori</h1>
                    <p class="text-gray-500 text-xs mt-1">Sistem detecție prezență tensiune (Optocuploare)</p>
                </div>
                <div class="flex items-center gap-2">
                    <div id="sys-pulse" class="w-2 h-2 rounded-full bg-red-600"></div>
                    <span id="sys-text" class="label-tech text-red-500">Sistem Offline</span>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="grid-inputs">
                </div>
        </div>
    </div>

    <script>
        // Configurare Firebase
        const firebaseConfig = {
            databaseURL: "https://monitorizate-tablou-verzisori-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Numele exacte din baza ta de date (Firebase)
        const sensorList = ["AC 1", "AC 2", "Generala", "Generator", "Rezerva", "UPS 1"];

        const container = document.getElementById('grid-inputs');

        // Creăm elementele vizuale pentru fiecare senzor
        sensorList.forEach(nume => {
            const safeId = nume.replace(/\s+/g, '');
            const div = document.createElement('div');
            div.id = `card-${safeId}`;
            div.className = `circuit-card rounded-xl p-4 flex flex-col justify-between h-28`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="bg-gray-800/50 px-2 py-0.5 rounded text-[9px] font-bold text-gray-400 uppercase tracking-widest">Monitor</div>
                    <div id="dot-${safeId}" class="status-dot"></div>
                </div>
                <div>
                    <div class="text-[12px] font-bold text-gray-100 mb-1 tracking-tight">${nume}</div>
                    <div id="status-${safeId}" class="text-[10px] uppercase tracking-widest text-gray-500 font-bold italic">Verificare...</div>
                </div>
            `;
            container.appendChild(div);
        });

        // Ascultăm datele din ramura principală 'verzisori'
        db.ref('verzisori').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // 1. Update Status Sistem & Conexiune
            document.getElementById('conn-status').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
            document.getElementById('sys-pulse').className = "status-dot-on w-2 h-2";
            document.getElementById('sys-text').innerText = "Sistem Online";
            document.getElementById('sys-text').className = "label-tech text-emerald-500";
            document.getElementById('last-sync').innerText = "ULTIMUL UPDATE: " + new Date().toLocaleTimeString('ro-RO');

            // 2. Update Mediu (Temperatura & Umiditate din folderul 'setari')
            if(data.setari) {
                document.getElementById('temp-val').innerText = data.setari.temperatura !== undefined ? data.setari.temperatura : "--";
                document.getElementById('hum-val').innerText = data.setari.umiditate !== undefined ? data.setari.umiditate : "--";
            }

            // 3. Update Siguranțe (din folderul 'sigurante')
            if(data.sigurante) {
                sensorList.forEach(nume => {
                    const safeId = nume.replace(/\s+/g, '');
                    const stare = data.sigurante[nume]; // Așteaptă "OK" sau "ALERTA"
                    
                    const card = document.getElementById(`card-${safeId}`);
                    const dot = document.getElementById(`dot-${safeId}`);
                    const text = document.getElementById(`status-${safeId}`);

                    if(stare === "OK") {
                        card.classList.add('circuit-on');
                        dot.className = "status-dot status-dot-on";
                        text.innerText = "TENSIUNE OK";
                        text.classList.replace('text-gray-500', 'text-emerald-500');
                    } else {
                        card.classList.remove('circuit-on');
                        dot.className = "status-dot";
                        text.innerText = "LIPSĂ TENSIUNE";
                        text.classList.replace('text-emerald-500', 'text-gray-500');
                    }
                });
            }
        }, (error) => {
            console.error("Eroare Firebase:", error);
            document.getElementById('conn-status').className = "w-3 h-3 rounded-full bg-red-600";
        });
    </script>
</body>
</html>
